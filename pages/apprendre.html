<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/globe-modified.png">
    <title> GeoGames </title> 
    <link rel="stylesheet" href="../css/styleTW.css">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </head>
  <body>
    <header class="navbar">
      <div class="flex-1">
        <a href="../index.html"><img src="../img/globe-modified.png" alt="Globe"></a>
        <a href="../index.html" class="logo-text">GeoGames</a>
      </div>
      <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
          <li><a class="titre_header" href="../index.html" data-i18n="nav.games"> Jeux </a></li>
          <li><a class="titre_header active" href="apprendre.html" data-i18n="nav.learn"> Apprendre </a></li>
        </ul>
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="fr" title="Français">
            <img src="../flags/fr.png" alt="FR">
          </button>
          <button class="lang-btn" data-lang="en" title="English">
            <img src="../flags/gb.png" alt="EN">
          </button>
        </div>
      </div>
    </header>
    <div class="sommaire">
      <h2 data-i18n="sommaire.title">Sommaire</h2>
      <ul>
        <li><a href="#recherche-drapeaux" data-i18n="sommaire.flags">1. Drapeaux pays</a></li>
        <li><a href="#carte-continents" data-i18n="sommaire.continents">2. Continents</a></li>
        <li><a href="#carte-monde" data-i18n="sommaire.world">3. Monde</a></li>
        <li><a href="#carte-regions-france" data-i18n="sommaire.regionsFR">4. Régions de France</a></li>
        <li><a href="#carte-departements-france" data-i18n="sommaire.departmentsFR">5. Départements de France</a></li>
      </ul>
    </div>
    <div id="recherche-drapeaux" style="height: 4vh;"></div>
    <h1 class="titre_principal" style="margin-bottom: 4vh;" data-i18n="learn.flagsTitle">Drapeaux pays</h1>
    <div style="margin-bottom: 2vh;"></div>
    <input type="text" id="search" class="search-input" placeholder="Rechercher un pays (ex: Roumanie)" data-i18n-placeholder="learn.searchPlaceholder" required="">
    <ul id="country-list" style="display: flex; flex-direction: column; align-items: stretch; padding: 0; margin: 0.5rem auto 0; width:320px;"></ul>
    <div class="flag-display" id="learn-flag-display">
      <img id="flagSugg" src="" alt="">
    </div>

    <div id="carte-continents" style="height: 4vh;"></div>
    <h1 class="titre_principal" data-i18n="learn.mapContinents">Carte des continents</h1>
    <object type="image/svg+xml" data="../img/map_continents.svg" class="map" width="1100">
      Votre navigateur ne peut pas afficher la carte des continents.
    </object>
    
    <div id="carte-monde"></div>
    <h1 class="titre_principal" data-i18n="learn.mapWorld">Carte du monde</h1>
    <object type="image/svg+xml" data="../img/map_world.svg" class="map">
      Votre navigateur ne peut pas afficher la carte du monde.
    </object>
    
    <div id="carte-regions-france"></div>
    <h1 class="titre_principal" data-i18n="learn.mapRegions">Carte des régions de France</h1>
    <object type="image/svg+xml" data="../img/map_FR_reg.svg" class="map">
      Votre navigateur ne peut pas afficher la carte des regions de France.
    </object>
    
    <div id="carte-departements-france"></div>
    <h1 class="titre_principal" data-i18n="learn.mapDepartments">Carte des départements de France</h1>
    <object type="image/svg+xml" data="../img/map_FR_dep.svg" class="map">
      Votre navigateur ne peut pas afficher la carte des departements de France.
    </object>
    <div style="height: 3vh;"></div>
    <script src="../json/local_bundle.js"></script>
    <script src="../json/learn_maps_bundle.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/learnMaps.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/zoomPan.js"></script>
    <script src="../js/controls.js"></script>
    <script src="../js/init.js"></script>
  </body>
</html>
